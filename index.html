<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORAL TASK II - CSI Assessment</title>
    <style>
        :root {
            --oxford-blue: #002147;
            --oxford-gold: #F39200;
            --soft-bg: #f4f7f9;
            --success: #10b981;
            --drive-blue: #4285F4;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--soft-bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { max-width: 700px; width: 100%; }

        .card {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 8px solid var(--oxford-blue);
        }

        .header-logo {
            font-weight: bold;
            color: var(--oxford-blue);
            font-size: 1.6rem;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .student-inputs { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 25px; 
        }
        
        .full-width { grid-column: span 2; }

        input {
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--oxford-blue); }

        .question-display {
            background: #fffcf0;
            border: 2px solid var(--oxford-gold);
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #qNumber { color: var(--oxford-gold); font-weight: bold; font-size: 0.9rem; margin-bottom: 10px; text-transform: uppercase; }
        #qText { font-size: 1.4rem; color: var(--oxford-blue); line-height: 1.4; margin: 0; }

        .timer-box { font-size: 2.5rem; font-weight: bold; color: var(--danger); margin: 20px 0; display: none; }
        .recording .timer-box { display: block; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        button {
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
            transition: 0.3s;
        }

        .btn-start { background: var(--oxford-blue); color: white; }
        .btn-next { background: var(--oxford-gold); color: white; display: none; }
        .btn-finish { background: #1e293b; color: white; display: none; }
        .btn-drive { background: var(--drive-blue); color: white; margin-top: 15px; }
        .btn-retry { background: var(--danger); color: white; font-size: 0.9rem; margin-top: 10px; }

        /* BLOQUEO FINAL */
        #finalSuccessMessage {
            display: none;
            padding: 20px;
            text-align: center;
        }
        
        .icon-check { font-size: 5rem; color: var(--success); margin-bottom: 15px; }

        @media print { .no-print { display: none; } #reportArea { display: block !important; border: none; box-shadow: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card no-print" id="setupUI">
        <div class="header-logo">ORAL TASK II</div>
        
        <div class="student-inputs">
            <input type="text" id="firstName" placeholder="First Name">
            <input type="text" id="lastName" placeholder="Last Name">
            <input type="text" id="sClass" class="full-width" placeholder="Class (e.g. 5th A)">
        </div>

        <div class="question-display">
            <div id="qNumber">Ready to start?</div>
            <p id="qText">Complete your details above.</p>
        </div>

        <div class="timer-box" id="timer">00:00</div>
        
        <button id="startBtn" class="btn-start" onclick="initTest()">🎙️ Start Assessment</button>
        <button id="nextBtn" class="btn-next" onclick="nextQuestion()">Next Question ➡️</button>
        <button id="finishBtn" class="btn-finish" onclick="stopAndFinish()">🏁 Finish & Review</button>
    </div>

    <div id="reportArea" class="card" style="display:none;">
        <div id="submissionControls">
            <h2 style="color: var(--oxford-blue); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px;">Evaluation Report</h2>
            <p style="text-align: left;"><strong>Student:</strong> <span id="repName"></span></p>
            <p style="text-align: left;"><strong>Class:</strong> <span id="repClass"></span></p>
            
            <div class="no-print" style="background: #f8fafc; border: 2px dashed #cbd5e1; padding: 20px; border-radius: 12px; margin: 20px 0;">
                <p style="margin-top:0; color: var(--oxford-blue); font-weight: bold;">🎧 Step 1: Review your audio</p>
                <audio id="finalAudio" controls style="width: 100%; margin-bottom: 10px;"></audio>
                <button id="retryBtn" class="btn-retry" onclick="retryTest()">🔄 Delete & Record Again</button>
            </div>

            <div class="no-print">
                <p style="color: var(--oxford-blue); font-weight: bold;">📤 Step 2: Final Step</p>
                <button id="driveBtn" class="btn-drive" onclick="uploadToDrive()">Confirm & Send to Teacher</button>
                <div id="status" style="font-weight: bold; margin-top: 10px;"></div>
            </div>
        </div>

        <div id="finalSuccessMessage">
            <div class="icon-check">✓</div>
            <h2 style="color: var(--oxford-blue); margin-bottom: 10px;">ORAL TASK II COMPLETED</h2>
            <p style="font-size: 1.2rem; color: #475569;">Your assessment has been sent successfully.</p>
            <p style="color: #64748b; margin-bottom: 30px;">Great job! You can now close this window.</p>
            <button style="background: #64748b; color:white; width: auto; padding: 12px 30px;" onclick="window.print()">🖨️ Print/Save Report</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYJh8YRfdxdqwCo4cnU6hVUsWu4NnwJQtPV5yeVtUn-CCytM7uN8L8Ts78QLBKqqWPvA/exec";
    
    const questions = [
        "What's your name and how old are you?",
        "What is the first thing you like to do when you get out of bed?",
        "What do you like to eat for lunch?",
        "How do you go to school each day?",
        "What do you like doing after school?",
        "Who do you live with at home?",
        "Who is your best friend and why do you like them?",
        "What is your favorite room in your house?",
        "Do you have a pet? What is it like?",
        "What do you usually do on Saturdays?",
        "What sport do you like playing?"
    ];

    let currentIdx = 0, mediaRecorder, chunks = [], timerInt, seconds = 0, audioBlob;

    async function initTest() {
        if(!document.getElementById('firstName').value || !document.getElementById('lastName').value) {
            return alert("Please enter your name and last name!");
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                audioBlob = new Blob(chunks, { type: 'audio/mpeg' });
                document.getElementById('finalAudio').src = URL.createObjectURL(audioBlob);
            };
            mediaRecorder.start();
            document.body.classList.add('recording');
            timerInt = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds/60).toString().padStart(2,'0'), s = (seconds%60).toString().padStart(2,'0');
                document.getElementById('timer').textContent = `${m}:${s}`;
            }, 1000);
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
            nextQuestion();
        } catch (err) { alert("Mic error: Please allow microphone access."); }
    }

    function nextQuestion() {
        if(currentIdx < questions.length) {
            document.getElementById('qNumber').textContent = `QUESTION ${currentIdx + 1} OF ${questions.length}`;
            document.getElementById('qText').textContent = questions[currentIdx++];
            if(currentIdx === questions.length) {
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('finishBtn').style.display = 'block';
            }
        }
    }

    function stopAndFinish() {
        mediaRecorder.stop();
        clearInterval(timerInt);
        document.getElementById('repName').textContent = `${document.getElementById('lastName').value}, ${document.getElementById('firstName').value}`;
        document.getElementById('repClass').textContent = document.getElementById('sClass').value;
        document.getElementById('setupUI').style.display = 'none';
        document.getElementById('reportArea').style.display = 'block';
        if(mediaRecorder.stream) mediaRecorder.stream.getTracks().forEach(t => t.stop());
    }

    function retryTest() {
        if(confirm("Are you sure you want to delete this recording and start over?")) {
            currentIdx = 0; seconds = 0; chunks = [];
            document.getElementById('reportArea').style.display = 'none';
            document.getElementById('setupUI').style.display = 'block';
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('finishBtn').style.display = 'none';
            document.getElementById('timer').textContent = "00:00";
            document.body.classList.remove('recording');
        }
    }

    async function uploadToDrive() {
        const status = document.getElementById('status');
        const driveBtn = document.getElementById('driveBtn');
        
        driveBtn.disabled = true;
        status.textContent = "⏳ Sending to teacher... do not close the window.";
        status.style.color = "orange";

        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = async () => {
            const base64data = reader.result.split(',')[1];
            try {
                fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({
                        base64: base64data,
                        filename: `${document.getElementById('lastName').value}_${document.getElementById('firstName').value}_${document.getElementById('sClass').value}.mp3`
                    })
                });

                // BLOQUEO TOTAL TRAS EL ENVÍO
                setTimeout(() => {
                    document.getElementById('submissionControls').style.display = 'none';
                    document.getElementById('finalSuccessMessage').style.display = 'block';
                }, 2000);

            } catch (e) {
                status.textContent = "❌ Error. Check connection and try again.";
                status.style.color = "red";
                driveBtn.disabled = false;
            }
        };
    }
</script>
</body>
</html>
