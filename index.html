<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My English Interview</title>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #06b6d4;
            --accent: #f59e0b;
            --bg: #eef2ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 8px solid white;
        }

        .header h1 { color: var(--primary); margin-bottom: 5px; font-size: 2rem; }
        .header p { color: #64748b; margin-bottom: 25px; font-weight: bold; }

        .question-box {
            background: #f8fafc;
            border: 3px dashed var(--secondary);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #questionText {
            font-size: 1.4rem;
            color: #1e293b;
            font-weight: 600;
        }

        .controls { display: flex; flex-direction: column; gap: 15px; align-items: center; }

        button {
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            width: 80%;
        }

        .btn-next { background: var(--accent); color: white; box-shadow: 0 4px 0 #b45309; }
        .btn-next:active { transform: translateY(4px); box-shadow: none; }

        .btn-rec { background: #ef4444; color: white; }
        .btn-stop { background: #1e293b; color: white; }
        
        .timer {
            font-family: monospace;
            font-size: 2rem;
            color: #ef4444;
            margin: 10px 0;
            visibility: hidden;
        }

        .recording .timer { visibility: visible; }
        
        input {
            width: 80%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 2px solid #ddd;
            text-align: center;
        }

        audio { margin-top: 15px; width: 100%; }
        
        #finishArea { display: none; }
    </style>
</head>
<body>

<div class="card" id="mainApp">
    <div class="header">
        <h1>🎤 Talk to Me!</h1>
        <p>Answer the questions to practice your English</p>
    </div>

    <input type="text" id="studentName" placeholder="Enter your name first!">

    <div class="question-box">
        <p id="questionText">Click the button below to get your first question!</p>
    </div>

    <div class="controls">
        <button class="btn-next" onclick="nextQuestion()">🎲 Get New Question</button>
        <div class="timer" id="timer">00:00</div>
        <button class="btn-rec" id="recBtn" onclick="startRecording()" disabled>🔴 Start Recording</button>
        <button class="btn-stop" id="stopBtn" onclick="stopRecording()" style="display:none;">⏹ Stop Answer</button>
        
        <audio id="playback" controls style="display:none;"></audio>
        <button id="dlBtn" style="display:none; background: var(--secondary); color:white;" onclick="download()">💾 Download My Answer</button>
    </div>

    <button onclick="finish()" style="margin-top: 30px; background: none; color: #94a3b8; text-decoration: underline; font-size: 0.9rem;">I'm finished with all questions</button>
</div>

<div class="card" id="finishArea">
    <h1>🌟 Awesome!</h1>
    <p id="congratsMsg"></p>
    <button class="btn-next" onclick="location.reload()">Restart Interview</button>
</div>

<script>
    const questions = [
        "What's your name? How old are you? Where do you live?",
        "What is the first thing you like to do when you get out of bed?",
        "What do you like to eat for lunch?",
        "How do you go to school each day?",
        "What do you like doing after school?",
        "Who do you live with at home?",
        "Who is your best friend and why do you like them?",
        "What is your favorite room in your house?",
        "Do you have a pet? What is it like?",
        "What do you usually do on Saturdays?",
        "What sport do you like playing?"
    ];

    let mediaRecorder;
    let chunks = [];
    let timerInterval;
    let seconds = 0;

    function nextQuestion() {
        const randomQ = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('questionText').textContent = randomQ;
        document.getElementById('recBtn').disabled = false;
        document.getElementById('playback').style.display = 'none';
        document.getElementById('dlBtn').style.display = 'none';
    }

    async function startRecording() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];

        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            const audio = document.getElementById('playback');
            audio.src = url;
            audio.style.display = 'block';
            document.getElementById('dlBtn').style.display = 'inline-block';
            stream.getTracks().forEach(t => t.stop());
        };

        mediaRecorder.start();
        document.body.classList.add('recording');
        document.getElementById('recBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';
        
        seconds = 0;
        document.getElementById('timer').textContent = "00:00";
        timerInterval = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${m}:${s}`;
        }, 1000);
    }

    function stopRecording() {
        mediaRecorder.stop();
        clearInterval(timerInterval);
        document.body.classList.remove('recording');
        document.getElementById('recBtn').style.display = 'inline-block';
        document.getElementById('stopBtn').style.display = 'none';
    }

    function download() {
        const name = document.getElementById('studentName').value || 'Student';
        const blob = new Blob(chunks, { type: 'audio/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${name}_interview_answer.webm`;
        a.click();
    }

    function finish() {
        const name = document.getElementById('studentName').value || 'Friend';
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('finishArea').style.display = 'block';
        document.getElementById('congratsMsg').textContent = `Great job, ${name}! You practiced your speaking skills today.`;
    }
</script>

</body>
</html>
