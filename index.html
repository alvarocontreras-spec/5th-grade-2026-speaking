<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxford Flyers - A2 Assessment CSI</title>
    <style>
        :root {
            --oxford-blue: #002147;
            --oxford-gold: #F39200;
            --soft-bg: #f4f7f9;
            --success: #10b981;
            --drive-blue: #4285F4;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--soft-bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { max-width: 700px; width: 100%; }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 8px solid var(--oxford-blue);
        }

        .header-logo {
            font-weight: bold;
            color: var(--oxford-blue);
            font-size: 1.4rem;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            text-transform: uppercase;
        }

        /* DISEÑO DE INPUTS MEJORADO */
        .student-inputs { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 20px; 
        }
        
        .full-width { grid-column: span 2; }

        input {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
        }

        input:focus { border-color: var(--oxford-blue); }

        /* CUADRO DE PREGUNTAS FLEXIBLE (NO SE CORTA) */
        .question-display {
            background: #fffcf0;
            border: 2px solid var(--oxford-gold);
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
            min-height: 140px;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: visible;
        }

        #qNumber { color: var(--oxford-gold); font-weight: bold; font-size: 0.9rem; margin-bottom: 8px; }
        #qText { font-size: 1.25rem; color: var(--oxford-blue); line-height: 1.5; margin: 0; word-wrap: break-word; }

        .timer-box { font-size: 2.2rem; font-weight: bold; color: var(--danger); margin: 15px 0; display: none; }
        .recording .timer-box { display: block; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        button {
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-start { background: var(--oxford-blue); color: white; }
        .btn-next { background: var(--oxford-gold); color: white; display: none; }
        .btn-finish { background: #1e293b; color: white; display: none; }
        .btn-drive { background: var(--drive-blue); color: white; margin-top: 10px; }
        .btn-retry { background: var(--danger); color: white; font-size: 0.9rem; padding: 10px; }
        
        #reportArea {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--oxford-blue);
        }

        .review-box {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .feedback-section {
            background: #f0f7ff;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            border-left: 5px solid var(--oxford-blue);
        }

        .status-msg { font-size: 0.9rem; font-weight: bold; text-align: center; }

        @media print { .no-print { display: none; } #reportArea { display: block !important; border: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card no-print" id="setupUI">
        <div class="header-logo">Oxford Oral Assessment</div>
        
        <div class="student-inputs">
            <input type="text" id="firstName" placeholder="First Name">
            <input type="text" id="lastName" placeholder="Last Name">
            <input type="text" id="sClass" class="full-width" placeholder="Class (e.g. 5th A)">
        </div>

        <div class="question-display">
            <div id="qNumber">READY?</div>
            <p id="qText">Please enter your details to begin.</p>
        </div>

        <div class="timer-box" id="timer">00:00</div>
        
        <button id="startBtn" class="btn-start" onclick="initTest()">🎙️ Start Assessment</button>
        <button id="nextBtn" class="btn-next" onclick="nextQuestion()">Next Question ➡️</button>
        <button id="finishBtn" class="btn-finish" onclick="stopAndFinish()">🏁 Finish & Review</button>
    </div>

    <div id="reportArea">
        <h2 style="color: var(--oxford-blue); margin-top: 0;">Evaluation Report</h2>
        <p><strong>Student:</strong> <span id="repName"></span> | <strong>Class:</strong> <span id="repClass"></span></p>
        
        <div class="review-box no-print">
            <p style="margin-top:0; color: var(--oxford-blue); font-weight: bold;">🎧 Listen to your recording:</p>
            <audio id="finalAudio" controls style="width: 100%; margin-bottom: 10px;"></audio>
            <button class="btn-retry" onclick="retryTest()">🔄 Record Again</button>
        </div>

        <div class="feedback-section">
            <h3 style="margin-top:0">🎯 My Progress (A2):</h3>
            <ul style="font-size: 0.9rem; color: #334155; padding-left: 20px;">
                <li>I connect ideas using <b>and, but, because.</b></li>
                <li>I speak in <b>complete sentences.</b></li>
                <li>I can describe my <b>home and school.</b></li>
            </ul>
        </div>

        <div class="no-print">
            <button id="driveBtn" class="btn-drive" onclick="uploadToDrive()">📤 Send to Teacher</button>
            <div id="status" class="status-msg"></div>
            <button style="background: #64748b; color:white; font-size: 0.9rem;" onclick="window.print()">🖨️ Save as PDF</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYJh8YRfdxdqwCo4cnU6hVUsWu4NnwJQtPV5yeVtUn-CCytM7uN8L8Ts78QLBKqqWPvA/exec";
    
    const questions = [
        "What's your name?",
        "How old are you?",
        "What time do you wake up",
        "How do you go to school each day?",
        "What do you do after school?",
        "What is your favorite subject?",
        "Do you have a pet? What is its name?",
        "What do you usually do on Saturdays?",
        "What sport do you play?",
        "What time do you go to bed?"
    ];

    let currentIdx = 0, mediaRecorder, chunks = [], timerInt, seconds = 0, audioBlob;

    async function initTest() {
        if(!document.getElementById('firstName').value || !document.getElementById('lastName').value) {
            return alert("Please enter both First and Last Name!");
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                audioBlob = new Blob(chunks, { type: 'audio/mpeg' });
                document.getElementById('finalAudio').src = URL.createObjectURL(audioBlob);
            };
            mediaRecorder.start();
            document.body.classList.add('recording');
            timerInt = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds/60).toString().padStart(2,'0');
                let s = (seconds%60).toString().padStart(2,'0');
                document.getElementById('timer').textContent = `${m}:${s}`;
            }, 1000);
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
            nextQuestion();
        } catch (err) { alert("Mic error: " + err); }
    }

    function nextQuestion() {
        if(currentIdx < questions.length) {
            document.getElementById('qNumber').textContent = `QUESTION ${currentIdx + 1} OF ${questions.length}`;
            document.getElementById('qText').textContent = questions[currentIdx];
            currentIdx++;
            if(currentIdx === questions.length) {
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('finishBtn').style.display = 'block';
            }
        }
    }

    function stopAndFinish() {
        mediaRecorder.stop();
        clearInterval(timerInt);
        const fullName = `${document.getElementById('lastName').value}, ${document.getElementById('firstName').value}`;
        document.getElementById('repName').textContent = fullName;
        document.getElementById('repClass').textContent = document.getElementById('sClass').value;
        document.getElementById('setupUI').style.display = 'none';
        document.getElementById('reportArea').style.display = 'block';
        if(mediaRecorder.stream) mediaRecorder.stream.getTracks().forEach(t => t.stop());
    }

    function retryTest() {
        if(confirm("Start again? Current recording will be deleted.")) {
            currentIdx = 0; seconds = 0; chunks = [];
            document.getElementById('reportArea').style.display = 'none';
            document.getElementById('setupUI').style.display = 'block';
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('finishBtn').style.display = 'none';
            document.getElementById('timer').textContent = "00:00";
            document.body.classList.remove('recording');
        }
    }

    async function uploadToDrive() {
        const status = document.getElementById('status');
        const fName = document.getElementById('firstName').value;
        const lName = document.getElementById('lastName').value;
        const sClass = document.getElementById('sClass').value;
        
        status.textContent = "⏳ Sending to teacher...";
        status.style.color = "orange";

        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = async () => {
            const base64data = reader.result.split(',')[1];
            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    base64: base64data,
                    filename: `${lName}_${fName}_${sClass}.mp3`
                })
            });
            setTimeout(() => {
                status.textContent = "✅ Sent successfully!";
                status.style.color = "green";
                document.getElementById('driveBtn').disabled = true;
            }, 2000);
        };
    }
</script>
</body>
</html>
