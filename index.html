<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyers Speaking Practice</title>
    <style>
        :root {
            --primary: #003D82;
            --secondary: #F39200;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f0f9ff; /* Brighter, kid-friendly blue */
            --card: #ffffff;
        }

        body {
            font-family: 'Comic Sans MS', 'Segoe UI', sans-serif; /* Friendly font */
            background-color: var(--bg);
            padding: 20px;
            color: #1e293b;
        }

        .container { max-width: 800px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 0px #cbd5e1;
        }

        header h1 { color: var(--primary); font-size: 2.2rem; }

        .student-info {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            border: 2px solid var(--primary);
        }

        input {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            flex: 1;
            font-size: 1rem;
        }

        section {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            border-bottom: 5px solid var(--secondary);
        }

        .instruction {
            background: #fff7ed;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: #9a3412;
            border: 1px dashed var(--secondary);
        }

        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .img-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            border: 3px solid #eee;
        }

        .recorder-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 15px;
        }

        .timer { font-size: 3rem; font-weight: bold; color: var(--primary); }

        .controls button {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .btn-record { background: var(--danger); color: white; }
        .btn-stop { background: #475569; color: white; }
        .btn-download { background: var(--success); color: white; margin-top: 10px; }

        button:disabled { opacity: 0.3; cursor: not-allowed; }
        button:hover:not(:disabled) { transform: scale(1.05); }

        #reportContainer {
            display: none;
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌟 English Speaking Star! 🌟</h1>
        <p>Oxford Flyers Level</p>
    </header>

    <div id="assessmentForm">
        <div class="student-info">
            <input type="text" id="studentName" placeholder="Your Name here...">
            <input type="text" id="className" placeholder="Class (e.g. 5th Grade)">
        </div>

        <section>
            <h2>📸 Task: Tell a Story!</h2>
            <div class="instruction">
                Look at the pictures and tell a story. What is happening? 
                <br><strong>Try to speak for 1 minute!</strong>
            </div>

            <div class="image-gallery">
                <div class="img-card">
                    <img src="https://images.unsplash.com/photo-1514432324607-2e4c00038fee?w=400" alt="Park">
                    <p style="text-align:center; font-weight:bold;">1. The Park</p>
                </div>
                <div class="img-card">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400" alt="Dinner">
                    <p style="text-align:center; font-weight:bold;">2. Lunch time</p>
                </div>
                <div class="img-card">
                    <img src="https://images.unsplash.com/photo-1522202176988-696ce933bbe3?w=400" alt="Class">
                    <p style="text-align:center; font-weight:bold;">3. Studying</p>
                </div>
            </div>

            <div class="recorder-box">
                <div class="timer" id="timer">00:00</div>
                <div class="controls">
                    <button class="btn-record" id="rec-btn" onclick="startRecording()">🔴 Start Talking</button>
                    <button class="btn-stop" id="stop-btn" onclick="stopRecording()" disabled>⏹ I'm Finished</button>
                </div>
                <audio id="audioPlayback" controls style="display:none; margin-top:20px;"></audio>
                <button class="btn-download" id="dl-btn" onclick="downloadAudio()" style="display:none;">💾 Save my Story</button>
            </div>
        </section>

        <button onclick="showFinish()" style="width:100%; margin-top:30px; padding:20px; background:var(--primary); color:white; border-radius:15px; border:none; font-size:1.2rem; cursor:pointer;">🏁 Click here when done!</button>
    </div>

    <div id="reportContainer">
        <h2 style="font-size:3rem;">🎉 Great Job! 🎉</h2>
        <p id="studentDisplay" style="font-size:1.5rem; margin:20px 0;"></p>
        <p>You have completed your Speaking Practice.</p>
        <button onclick="location.reload()" style="background:var(--secondary); color:white; padding:15px 30px; border-radius:10px; border:none; margin-top:20px; cursor:pointer;">Try Again</button>
    </div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let timerInterval;
    let seconds = 0;

    async function startRecording() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            const audio = document.getElementById('audioPlayback');
            audio.src = url;
            audio.style.display = 'block';
            document.getElementById('dl-btn').style.display = 'block';
            stream.getTracks().forEach(track => track.stop());
        };

        mediaRecorder.start();
        document.getElementById('rec-btn').disabled = true;
        document.getElementById('stop-btn').disabled = false;
        
        seconds = 0;
        timerInterval = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${m}:${s}`;
        }, 1000);
    }

    function stopRecording() {
        mediaRecorder.stop();
        clearInterval(timerInterval);
        document.getElementById('stop-btn').disabled = true;
    }

    function downloadAudio() {
        const name = document.getElementById('studentName').value || 'Student';
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${name}_my_story.webm`;
        a.click();
    }

    function showFinish() {
        const name = document.getElementById('studentName').value;
        if(!name) return alert("Please type your name first!");
        
        document.getElementById('assessmentForm').style.display = 'none';
        document.getElementById('reportContainer').style.display = 'block';
        document.getElementById('studentDisplay').textContent = "Excellent work, " + name + "!";
    }
</script>

</body>
</html>
